spring:
  application:
    name: tnt-billing-wallet

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:billing_db}
    username: ${DB_USER:tiibntick}
    password: ${DB_PASSWORD:tiibntick}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  liquibase:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:billing_db}
    user: ${DB_USER:tiibntick}
    password: ${DB_PASSWORD:tiibntick}
    change-log: classpath:db/changelog/tnt-billing-wallet-master.yaml
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: tnt-billing-wallet
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Provider secrets (MTN/Orange/Stripe API keys, webhook secrets) removed as part of the
# payment/wallet Kernel-delegation workstream — provider integration is now exclusively
# the Kernel's responsibility, and no provider credential should live in this repo anymore.
# See docs/audits/remediation/workstream-payment-billing-kernel-delegation.md step 6/10.

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
