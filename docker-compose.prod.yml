# ==============================================================
#  TIIBNTICK-CORE — kernel/ERP (monolithe modulaire) PRODUCTION
# ==============================================================
#  Resource server : valide les JWT via la JWKS de kernel-core, et relaie vers
#  kernel-core (client tibntick-backend). Exposé sur tiibntick-core.yowyob.com.
#  Infra en sidecars privés : Postgres + Redis + Kafka (KRaft) + MinIO.
# ==============================================================
services:

  tnt-core:
    image: "${APP_IMAGE:?APP_IMAGE requis - ex ghcr.io/yowyob/tiibntick-core:main}"
    container_name: tiibntick-core
    pull_policy: always
    restart: unless-stopped
    env_file: [.env]
    environment:
      SERVER_PORT: "8080"
      SERVER_FORWARD_HEADERS_STRATEGY: "framework"
      SWAGGER_SERVER_URL: "https://tiibntick-core.yowyob.com"
      CORS_ALLOWED_ORIGINS: "https://tiibntick.yowyob.com,https://tiibntick-market.yowyob.com,https://tiibntick-link.yowyob.com,https://tiibntick-go.yowyob.com,https://tiibntick-point.yowyob.com,https://tiibntick-agency.yowyob.com"
      # ── Postgres privé ──
      DB_HOST: "tnt-core-db"
      DB_PORT: "5432"
      DB_NAME: "tiibntick_core"
      DB_USER: "tiibntick"
      DB_PASSWORD: "${TNT_CORE_DB_PASSWORD:?TNT_CORE_DB_PASSWORD requis dans .env}"
      DB_SSL_MODE: "disable"
      # ── Redis privé ──
      REDIS_HOST: "tnt-core-redis"
      REDIS_PORT: "6379"
      # ── Kafka privé ──
      KAFKA_BOOTSTRAP: "yowyob-shared-kafka:9092"
      KAFKA_REPLICATION: "1"
      # ── MinIO privé (média) ──
      MINIO_ENDPOINT: "http://tnt-core-minio:9000"
      MINIO_PUBLIC_ENDPOINT: "http://tnt-core-minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "${TNT_CORE_MINIO_SECRET:?TNT_CORE_MINIO_SECRET requis dans .env}"
      # ── Sécurité JWT : resource server valide via la JWKS de kernel-core ──
      JWT_JWK_SET_URI: "https://kernel-core.yowyob.com/.well-known/jwks.json"
      JWT_AUTO_GENERATE_KEY_PAIR: "true"
      QR_HMAC_SECRET: "${TNT_CORE_QR_HMAC_SECRET:?TNT_CORE_QR_HMAC_SECRET requis dans .env}"
      # ── Relais vers kernel-core (client dédié, cf. .env.prod.example) ──
      TNT_KERNEL_BASE_URL: "https://kernel-core.yowyob.com"
      TNT_KERNEL_CLIENT_ID: "tibntick-backend"
      TNT_KERNEL_API_KEY: "${TNT_KERNEL_API_KEY:?TNT_KERNEL_API_KEY requis dans .env}"
      TNT_SYSTEM_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      # ── Variables applicatives reprises de tnt-bootstrap/.env.prod.example ──
      # (les endpoints d'infra restent nos sidecars ; on n'active PAS le profil prod
      #  car il désactive Swagger et exige Postgres TLS + clé JWT montée, non dispo ici.)
      TNT_AUTH_SERVICE_CODE: "TNT_AGENCY"
      JWT_KEY_ID: "tnt-core-key-prod"
      DB_POOL_INITIAL_SIZE: "2"
      DB_POOL_MAX_SIZE: "10"
      DB_POOL_MAX_IDLE_MINUTES: "30"
    healthcheck:
      # Liveness (léger, sans ping externe au kernel) : évite que le healthcheck hang/flap
      # quand l'agrégat /actuator/health bloque sur le kernel-ping. Fallback vers / si absent.
      test: ["CMD-SHELL", "curl -sf -o /dev/null --max-time 8 http://localhost:8080/actuator/health/liveness || curl -sf -o /dev/null --max-time 8 http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 180s
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "5" }
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tnt-core.rule=Host(`tiibntick-core.yowyob.com`)"
      - "traefik.http.routers.tnt-core.entrypoints=websecure"
      - "traefik.http.routers.tnt-core.tls=true"
      - "traefik.http.routers.tnt-core.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tnt-core.priority=100"
      - "traefik.http.services.tnt-core.loadbalancer.server.port=8080"
      - "traefik.docker.network=yowyob"
    depends_on:
      tnt-core-db: { condition: service_healthy }
      tnt-core-redis: { condition: service_healthy }
    networks: [yowyob, tnt-core-net]

  tnt-core-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: tiibntick-core-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: "tiibntick_core"
      POSTGRES_USER: "tiibntick"
      POSTGRES_PASSWORD: "${TNT_CORE_DB_PASSWORD:?TNT_CORE_DB_PASSWORD requis dans .env}"
    volumes:
      - tnt-core-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiibntick -d tiibntick_core"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [tnt-core-net]

  tnt-core-redis:
    image: redis:7-alpine
    container_name: tiibntick-core-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - tnt-core-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [tnt-core-net]


  tnt-core-minio:
    image: minio/minio:latest
    container_name: tiibntick-core-minio
    restart: unless-stopped
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "${TNT_CORE_MINIO_SECRET:?TNT_CORE_MINIO_SECRET requis dans .env}"
    volumes:
      - tnt-core-minio-data:/data
    networks: [tnt-core-net]

volumes:
  tnt-core-db-data:
  tnt-core-redis-data:
  tnt-core-minio-data:

networks:
  yowyob:
    external: true
    name: yowyob
  tnt-core-net:
    name: tiibntick-core-net
