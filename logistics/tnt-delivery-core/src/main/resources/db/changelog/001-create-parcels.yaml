databaseChangeLog:
  - changeSet:
      id: 001-create-tnt-parcels
      author: MANFOUO Braun
      comment: "Creates the tnt_parcels table for parcel physical characteristics"
      changes:
        - createTable:
            tableName: tnt_parcels
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: weight_kg
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: width_cm
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: height_cm
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: length_cm
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: fragile
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: perishable
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: photo_url
                  type: VARCHAR(1000)
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
