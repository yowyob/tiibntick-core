databaseChangeLog:
  - changeSet:
      id: 003-create-tnt-announcement-responses
      author: MANFOUO Braun
      comment: "Creates the tnt_announcement_responses table"
      changes:
        - createTable:
            tableName: tnt_announcement_responses
            columns:
              - column: { name: id,                     type: UUID,         constraints: { primaryKey: true, nullable: false } }
              - column: { name: announcement_id,         type: UUID,         constraints: { nullable: false, foreignKeyName: fk_resp_ann, references: tnt_delivery_announcements(id) } }
              - column: { name: delivery_person_id,      type: UUID,         constraints: { nullable: false } }
              - column: { name: estimated_arrival_time,  type: TIMESTAMPTZ,  constraints: { nullable: false } }
              - column: { name: note,                    type: TEXT }
              - column: { name: status,                  type: VARCHAR(20),  constraints: { nullable: false } }
              - column: { name: created_at,              type: TIMESTAMPTZ,  constraints: { nullable: false } }
              - column: { name: updated_at,              type: TIMESTAMPTZ,  constraints: { nullable: false } }
              - column: { name: version,                 type: BIGINT,       defaultValueNumeric: 0, constraints: { nullable: false } }

        - createIndex:
            indexName: idx_tnt_resp_announcement
            tableName: tnt_announcement_responses
            columns:
              - column: { name: announcement_id }
