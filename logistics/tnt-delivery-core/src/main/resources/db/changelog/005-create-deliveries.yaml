databaseChangeLog:
  - changeSet:
      id: 005-create-tnt-deliveries
      author: MANFOUO Braun
      comment: "Creates the tnt_deliveries table — core delivery lifecycle"
      changes:
        - createTable:
            tableName: tnt_deliveries
            columns:
              - column: { name: id,                    type: UUID,             constraints: { primaryKey: true, nullable: false } }
              - column: { name: tenant_id,              type: UUID,             constraints: { nullable: false } }
              - column: { name: announcement_id,        type: UUID }
              - column: { name: parcel_id,              type: UUID,             constraints: { nullable: false, foreignKeyName: fk_del_parcel, references: tnt_parcels(id) } }
              - column: { name: sender_id,              type: UUID,             constraints: { nullable: false } }
              - column: { name: delivery_person_id,     type: UUID }
              - column: { name: tracking_code,          type: VARCHAR(30),      constraints: { unique: true } }
              - column: { name: status,                 type: VARCHAR(30),      constraints: { nullable: false } }
              - column: { name: urgency,                type: VARCHAR(20),      constraints: { nullable: false } }
              # Pickup address
              - column: { name: pickup_street,          type: VARCHAR(255) }
              - column: { name: pickup_landmark,        type: VARCHAR(255) }
              - column: { name: pickup_district,        type: VARCHAR(100) }
              - column: { name: pickup_city,            type: VARCHAR(100),     constraints: { nullable: false } }
              - column: { name: pickup_country,         type: VARCHAR(10) }
              - column: { name: pickup_latitude,        type: DOUBLE PRECISION }
              - column: { name: pickup_longitude,       type: DOUBLE PRECISION }
              # Delivery address
              - column: { name: delivery_street,        type: VARCHAR(255) }
              - column: { name: delivery_landmark,      type: VARCHAR(255) }
              - column: { name: delivery_district,      type: VARCHAR(100) }
              - column: { name: delivery_city,          type: VARCHAR(100),     constraints: { nullable: false } }
              - column: { name: delivery_country,       type: VARCHAR(10) }
              - column: { name: delivery_latitude,      type: DOUBLE PRECISION }
              - column: { name: delivery_longitude,     type: DOUBLE PRECISION }
              # Recipient
              - column: { name: recipient_name,         type: VARCHAR(150),     constraints: { nullable: false } }
              - column: { name: recipient_phone,        type: VARCHAR(30),      constraints: { nullable: false } }
              - column: { name: recipient_alt_phone,    type: VARCHAR(30) }
              # Cost
              - column: { name: estimated_cost_distance, type: "NUMERIC(15,2)" }
              - column: { name: estimated_cost_time,     type: "NUMERIC(15,2)" }
              - column: { name: estimated_cost_road,     type: "NUMERIC(15,2)" }
              - column: { name: estimated_cost_weather,  type: "NUMERIC(15,2)" }
              - column: { name: estimated_cost_fuel,     type: "NUMERIC(15,2)" }
              - column: { name: cost_currency,           type: VARCHAR(10) }
              - column: { name: final_cost_total,        type: "NUMERIC(15,2)" }
              - column: { name: estimated_distance_km,   type: DOUBLE PRECISION }
              # ETA
              - column: { name: eta_estimated_arrival,   type: TIMESTAMPTZ }
              - column: { name: eta_lower_bound,         type: TIMESTAMPTZ }
              - column: { name: eta_upper_bound,         type: TIMESTAMPTZ }
              - column: { name: eta_confidence,          type: DOUBLE PRECISION }
              - column: { name: eta_remaining_minutes,   type: INTEGER }
              # Temporal
              - column: { name: scheduled_pickup_time,   type: TIMESTAMPTZ }
              - column: { name: estimated_delivery_time, type: TIMESTAMPTZ }
              - column: { name: actual_pickup_time,      type: TIMESTAMPTZ }
              - column: { name: actual_delivery_time,    type: TIMESTAMPTZ }
              - column: { name: notes,                   type: TEXT }
              - column: { name: created_at,              type: TIMESTAMPTZ,     constraints: { nullable: false } }
              - column: { name: updated_at,              type: TIMESTAMPTZ,     constraints: { nullable: false } }
              - column: { name: version,                 type: BIGINT,          defaultValueNumeric: 0, constraints: { nullable: false } }

        - createIndex:
            indexName: idx_tnt_del_tenant_sender
            tableName: tnt_deliveries
            columns:
              - column: { name: tenant_id }
              - column: { name: sender_id }

        - createIndex:
            indexName: idx_tnt_del_tenant_dp
            tableName: tnt_deliveries
            columns:
              - column: { name: tenant_id }
              - column: { name: delivery_person_id }

        - createIndex:
            indexName: idx_tnt_del_tenant_status
            tableName: tnt_deliveries
            columns:
              - column: { name: tenant_id }
              - column: { name: status }

        - createIndex:
            indexName: idx_tnt_del_tracking
            tableName: tnt_deliveries
            columns:
              - column: { name: tracking_code }
