# ArchUnit freeze configuration — Chantier E reactor-wide layering guardrails
# (see LayeringArchitectureTest). The 'adapter.in -> adapter.out' and
# 'application -> adapter.in.web' rules found pre-existing legacy violations
# scattered across many modules; they are frozen as a known baseline
# (tnt-bootstrap/archunit_store, committed to git) so the test suite is green
# today while still failing on any *new* violation introduced from now on.
# Fixed violations are automatically dropped from the baseline (allowStoreUpdate),
# so a regression can never silently slip back in unnoticed.
freeze.store.default.path=archunit_store
freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreUpdate=true
